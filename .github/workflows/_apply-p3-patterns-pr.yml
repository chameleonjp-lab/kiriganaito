name: Apply P3 decision patterns on PR

on:
  pull_request:
    branches:
      - main
    paths:
      - ".github/workflows/_apply-p3-patterns-pr.yml"
      - "tools/apply-p3-patterns.py"
      - "tests/p3-pattern-regression.js"
      - "P3_DECISION_PATTERN_CONTRACT.md"

permissions:
  contents: write

jobs:
  apply-and-verify:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Checkout head branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Apply P3 implementation
        run: python tools/apply-p3-patterns.py

      - name: Progressive autoplay
        run: node tests/progressive-autoplay.js

      - name: Release comprehensive
        run: node tests/release-comprehensive.js

      - name: Endurance 150km
        run: node tests/endurance-150km.js

      - name: P1 effective presentation
        run: node tests/effective-presentation-metrics.js

      - name: P2 density gate
        run: node tests/p2-density-regression.js

      - name: P3 pattern gate
        run: node tests/p3-pattern-regression.js

      - name: Upload patched artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: p3-patched-diagnostics
          path: |
            artifacts/p1-effective-presentation-metrics.json
            artifacts/p2-density-regression.json
            artifacts/p2-effective-presentation-30-seeds.json
            artifacts/p3-pattern-regression.json
            artifacts/progressive-autoplay-report.json
            artifacts/progressive-autoplay-summary.txt
            artifacts/release-test-report.json
            artifacts/release-test-summary.txt
            artifacts/endurance-150km-result.json
          if-no-files-found: warn

      - name: Commit verified P3 implementation
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git rm .github/workflows/_apply-p3-patterns-pr.yml tools/apply-p3-patterns.py
          git add index.html SPEC.md TEST_REPORT.md tests/effective-presentation-metrics.js \
            artifacts/p1-effective-presentation-metrics.json \
            artifacts/p2-density-regression.json \
            artifacts/p2-effective-presentation-30-seeds.json \
            artifacts/p3-pattern-regression.json \
            artifacts/progressive-autoplay-report.json \
            artifacts/progressive-autoplay-summary.txt \
            artifacts/release-test-report.json \
            artifacts/release-test-summary.txt \
            artifacts/endurance-150km-result.json
          git commit -m "feat: add staged decision patterns for P3"
          git push origin HEAD:${{ github.head_ref }}

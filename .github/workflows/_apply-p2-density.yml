name: Apply P2 density implementation

on:
  push:
    branches:
      - ai/kiriganaito-v18-effective-density
    paths:
      - .github/workflows/_apply-p2-density.yml

permissions:
  contents: write

jobs:
  apply-and-verify:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout branch
        uses: actions/checkout@v4
        with:
          ref: ai/kiriganaito-v18-effective-density
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Apply P2 implementation
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path

          index_path = Path("index.html")
          index = index_path.read_text()

          for old in (
              "kiriganaito-2026-07-11-v14-world-zones",
              "kiriganaito-2026-07-12-v16-spawn-director-correctness",
          ):
              index = index.replace(old, "kiriganaito-2026-07-18-v18-effective-density")

          anchor = '''      function spawnRequestQueue(zone) { return spawn.requests && spawn.requests[zone] ? spawn.requests[zone] : []; }'''
          helpers = '''      const P2_DENSITY = Object.freeze({
            SCORE_ITEM_OVERDUE_KM: 0.10,
            ONCOMING_OVERDUE_KM: 0.10,
          });
          function spawnRequestQueue(zone) { return spawn.requests && spawn.requests[zone] ? spawn.requests[zone] : []; }
          function hasPendingSpawnRequestKind(kind) {
            const zones = [WORLD_ZONE.GROUND, WORLD_ZONE.AIR, WORLD_ZONE.HOLE];
            for (let z = 0; z < zones.length; z++) {
              const q = spawnRequestQueue(zones[z]);
              for (let i = 0; i < q.length; i++) {
                const req = q[i];
                if (req.kind === kind && req.status !== SPAWN_REQUEST_STATUS.RESOLVED && req.status !== SPAWN_REQUEST_STATUS.SKIPPED) return true;
              }
            }
            return false;
          }
          function isHoleReservationActive(km) {
            return !spawn.needObstacleBeforeNextHole && (km >= spawn.nextHoleAt || hasPendingSpawnRequestKind(SPAWN_REQUEST_KIND.HOLE));
          }
          function isScoreItemReservationActive(km) {
            const dueAt = spawn.nextScoreItemAt ?? spawn.nextItemAt;
            return !spawn.needObstacleBeforeNextHole && !isHoleReservationActive(km) && km - dueAt >= P2_DENSITY.SCORE_ITEM_OVERDUE_KM;
          }
          function isOncomingReservationActive(km) {
            return km >= 0.8 && !spawn.needObstacleBeforeNextHole && !isHoleReservationActive(km) && !isScoreItemReservationActive(km) && km - spawn.nextOncomingAt >= P2_DENSITY.ONCOMING_OVERDUE_KM;
          }
          function isNonMandatoryGroundRequest(req) {
            if (!req || req.zone !== WORLD_ZONE.GROUND) return false;
            if (req.spawnSource !== SPAWN_SOURCE.NORMAL && req.spawnSource !== SPAWN_SOURCE.CHASE) return false;
            return req.kind === SPAWN_REQUEST_KIND.GROUND_OBSTACLE || req.kind === SPAWN_REQUEST_KIND.ONCOMING_OBSTACLE;
          }
          function shouldDeferSpawnRequest(req, km) {
            if (!isNonMandatoryGroundRequest(req)) return false;
            if (spawn.needObstacleBeforeNextHole) return true;
            if (isHoleReservationActive(km)) return true;
            if (isScoreItemReservationActive(km)) return true;
            return isOncomingReservationActive(km) && req.kind === SPAWN_REQUEST_KIND.GROUND_OBSTACLE;
          }'''
          if anchor not in index:
              raise SystemExit("spawnRequestQueue anchor missing")
          index = index.replace(anchor, helpers, 1)

          old_collect_head = '''        const forceEarlyOncoming = (earlyOncomingDue || (km >= 2 && !run.earlyOncomingSpawned));
          if (isDancerInvincible()'''
          new_collect_head = '''        const forceEarlyOncoming = (earlyOncomingDue || (km >= 2 && !run.earlyOncomingSpawned));
          const reserveHole = isHoleReservationActive(km);
          const reserveScoreItem = isScoreItemReservationActive(km);
          const reserveOncoming = isOncomingReservationActive(km);
          const suppressNormalGround = spawn.needObstacleBeforeNextHole || reserveHole || reserveScoreItem;
          if (isDancerInvincible()'''
          if old_collect_head not in index:
              raise SystemExit("collect head anchor missing")
          index = index.replace(old_collect_head, new_collect_head, 1)

          old_chase = '''        if (chase && chaseReady && run.elapsed >= (spawn.nextChaseEventAt || 999)) {'''
          new_chase = '''        if (chase && chaseReady && !suppressNormalGround && !reserveOncoming && run.elapsed >= (spawn.nextChaseEventAt || 999)) {'''
          if old_chase not in index:
              raise SystemExit("chase anchor missing")
          index = index.replace(old_chase, new_chase, 1)

          old_obstacle = '''        if (dueObstacle && chaseReady) {'''
          new_obstacle = '''        if (dueObstacle && chaseReady && !suppressNormalGround && !reserveOncoming) {'''
          if old_obstacle not in index:
              raise SystemExit("obstacle anchor missing")
          index = index.replace(old_obstacle, new_obstacle, 1)

          old_oncoming = '''        if (oncomingDue || forceEarlyOncoming) {'''
          new_oncoming = '''        if ((oncomingDue || forceEarlyOncoming) && (!suppressNormalGround || forceEarlyOncoming)) {'''
          if old_oncoming not in index:
              raise SystemExit("oncoming anchor missing")
          index = index.replace(old_oncoming, new_oncoming, 1)

          old_select = '''          const r = q[i]; if (r.nextAttemptKm > km || r.status === SPAWN_REQUEST_STATUS.RESOLVED || r.status === SPAWN_REQUEST_STATUS.SKIPPED) continue;
            if (best < 0'''
          new_select = '''          const r = q[i]; if (r.nextAttemptKm > km || r.status === SPAWN_REQUEST_STATUS.RESOLVED || r.status === SPAWN_REQUEST_STATUS.SKIPPED) continue;
            if (shouldDeferSpawnRequest(r, km)) continue;
            if (best < 0'''
          if old_select not in index:
              raise SystemExit("select anchor missing")
          index = index.replace(old_select, new_select, 1)

          index_path.write_text(index)

          metrics_path = Path("tests/effective-presentation-metrics.js")
          metrics = metrics_path.read_text()

          old_metric = '''      gapSamples: 0,
    };'''
          new_metric = '''      gapSamples: 0,
      presentationKm: [],
      bandCounts: { km0to1: 0, km1to2: 0, km2plus: 0 },
    };'''
          if old_metric not in metrics:
              raise SystemExit("metric init anchor missing")
          metrics = metrics.replace(old_metric, new_metric, 1)

          old_vars = '''  let maxBlankSecAfter500m = 0;
  let maxSimultaneousStrongHazards = 0;'''
          new_vars = '''  let maxBlankSecAfter500m = 0;
  let maxDecisionBlankSecAfter500m = 0;
  let lastDecisionSec = 0;
  let presentedMissTargetCount = 0;
  let maxSimultaneousStrongHazards = 0;'''
          if old_vars not in metrics:
              raise SystemExit("metric vars anchor missing")
          metrics = metrics.replace(old_vars, new_vars, 1)

          old_record = '''    metric.count += 1;
    if (metric.lastKm !== null) {'''
          new_record = '''    metric.count += 1;
    metric.presentationKm.push(entity.presentedKm);
    if (entity.presentedKm < 1) metric.bandCounts.km0to1 += 1;
    else if (entity.presentedKm < 2) metric.bandCounts.km1to2 += 1;
    else metric.bandCounts.km2plus += 1;
    if (type === "scoreItem" && Number(entity.missPenalty || 0) > 0) presentedMissTargetCount += 1;
    if (measurementStarted) {
      maxDecisionBlankSecAfter500m = Math.max(maxDecisionBlankSecAfter500m, entity.presentedSec - lastDecisionSec);
      lastDecisionSec = entity.presentedSec;
    }
    if (metric.lastKm !== null) {'''
          if old_record not in metrics:
              raise SystemExit("record anchor missing")
          metrics = metrics.replace(old_record, new_record, 1)

          old_measure_start = '''      lastAnyKm = run.runMeters / 1000;
      lastAnySec = run.elapsed;
    }'''
          new_measure_start = '''      lastAnyKm = run.runMeters / 1000;
      lastAnySec = run.elapsed;
      lastDecisionSec = run.elapsed;
    }'''
          if old_measure_start not in metrics:
              raise SystemExit("measurement start anchor missing")
          metrics = metrics.replace(old_measure_start, new_measure_start, 1)

          old_blank_tail = '''      maxBlankSecAfter500m = Math.max(maxBlankSecAfter500m, run.elapsed - lastAnySec);
    }
  }'''
          new_blank_tail = '''      maxBlankSecAfter500m = Math.max(maxBlankSecAfter500m, run.elapsed - lastAnySec);
      maxDecisionBlankSecAfter500m = Math.max(maxDecisionBlankSecAfter500m, run.elapsed - lastDecisionSec);
    }
  }'''
          if old_blank_tail not in metrics:
              raise SystemExit("blank tail anchor missing")
          metrics = metrics.replace(old_blank_tail, new_blank_tail, 1)

          old_report_fields = '''    maxBlankKmAfter500m,
    maxBlankSecAfter500m,
    maxSimultaneousStrongHazards,'''
          new_report_fields = '''    maxBlankKmAfter500m,
    maxBlankSecAfter500m,
    maxDecisionBlankSecAfter500m,
    presentedMissTargetCount,
    maxSimultaneousStrongHazards,'''
          if old_report_fields not in metrics:
              raise SystemExit("report fields anchor missing")
          metrics = metrics.replace(old_report_fields, new_report_fields, 1)
          metrics_path.write_text(metrics)

          spec_path = Path("SPEC.md")
          spec = spec_path.read_text()
          spec += '''\n\n## v18 P2 実効出現密度契約（現行）\n\n- 現行 CLIENT_VERSION は `kiriganaito-2026-07-18-v18-effective-density`。\n- 穴予定が期限へ達した時は、通常地上障害物と通常対向障害物を一時保留し、既存の穴安全距離を満たすための予約区間を作る。\n- 穴生成後は `between_holes` の必須障害物を優先し、それが解決するまで通常地上予定を保留する。\n- 加点アイテムが予定から0.10km以上遅れた場合は、穴予約を優先した上でアイテム安全区間を作る。\n- 通常対向障害物が予定から0.10km以上遅れた場合は、通常地上障害物だけを一時保留する。\n- `between_holes`、`early_oncoming`、`invincible` は通常予約より優先する。\n- 穴幅、障害物速度、TTC最低条件、ジャンプ、当たり判定、点数、UI、ランキング、Supabaseは変更しない。\n- P1の実効出現計測を継続し、30固定seedのP2密度ゲートで偏りを検査する。\n'''
          spec_path.write_text(spec)

          report_path = Path("TEST_REPORT.md")
          report = report_path.read_text()
          report += '''\n\n## v18 P2 実効出現密度再調整\n\n- 基準: P1固定seedでは穴16個/15km、最大穴間隔1.312km、加点アイテム最大間隔1.332km。\n- 対応: 穴、穴間必須障害物、期限超過アイテム、期限超過対向障害物の予約優先順位を追加。\n- 安全値は変更せず、通常地上予定を一時保留して既存安全距離を成立させる。\n- `tests/p2-density-regression.js` に30固定seedの合格条件を追加。\n- 自動検査結果は `artifacts/p2-density-regression.json` に記録する。\n'''
          report_path.write_text(report)
          PY

      - name: Run P1 effective presentation
        run: node tests/effective-presentation-metrics.js

      - name: Run P2 30-seed density gate
        run: node tests/p2-density-regression.js

      - name: Run progressive autoplay
        run: node tests/progressive-autoplay.js

      - name: Run release comprehensive
        run: node tests/release-comprehensive.js

      - name: Run endurance 150km
        run: node tests/endurance-150km.js

      - name: Commit verified implementation
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git rm .github/workflows/_apply-p2-density.yml
          git add index.html SPEC.md TEST_REPORT.md tests/effective-presentation-metrics.js \
            artifacts/p1-effective-presentation-metrics.json \
            artifacts/p2-effective-presentation-30-seeds.json \
            artifacts/p2-density-regression.json \
            artifacts/progressive-autoplay-report.json \
            artifacts/progressive-autoplay-summary.txt \
            artifacts/release-test-report.json \
            artifacts/release-test-summary.txt \
            artifacts/endurance-150km-result.json
          git commit -m "feat: rebalance effective spawn density for P2"
          git push origin HEAD:ai/kiriganaito-v18-effective-density

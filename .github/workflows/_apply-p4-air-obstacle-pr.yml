name: Apply P4 airborne obstacle on PR

on:
  pull_request:
    branches:
      - main
    paths:
      - ".github/workflows/_apply-p4-air-obstacle-pr.yml"
      - "tools/apply-p4-air-obstacle.py"
      - "tools/fix-p4-apply.py"
      - "tools/tune-p4-metrics.py"
      - "tools/tune-p4-density.py"
      - "tools/tune-p4-density-2.py"
      - "tools/tune-p4-density-3.py"
      - "tools/tune-p4-density-4.py"
      - "tools/tune-p4-density-5.py"
      - "tools/tune-p4-density-6.py"
      - "tools/tune-p4-density-7.py"
      - "tools/tune-p4-density-8.py"
      - "tools/tune-p4-density-9.py"
      - "tools/tune-p4-density-10.py"
      - "tools/tune-p4-density-11.py"
      - "tools/tune-p4-density-12.py"
      - "tools/tune-p4-diagnostics.py"
      - "tests/p4-air-obstacle-regression.js"
      - "P4_AIR_OBSTACLE_CONTRACT.md"

permissions:
  contents: write

jobs:
  apply-and-verify:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout head branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Apply P4 implementation
        id: apply
        continue-on-error: true
        run: |
          mkdir -p artifacts
          python tools/fix-p4-apply.py > artifacts/p4-apply.log 2>&1
          python tools/apply-p4-air-obstacle.py >> artifacts/p4-apply.log 2>&1
          python tools/tune-p4-metrics.py >> artifacts/p4-apply.log 2>&1
          python tools/tune-p4-density.py >> artifacts/p4-apply.log 2>&1
          python tools/tune-p4-density-2.py >> artifacts/p4-apply.log 2>&1
          python tools/tune-p4-density-3.py >> artifacts/p4-apply.log 2>&1
          python tools/tune-p4-density-4.py >> artifacts/p4-apply.log 2>&1
          python tools/tune-p4-density-5.py >> artifacts/p4-apply.log 2>&1
          python tools/tune-p4-density-6.py >> artifacts/p4-apply.log 2>&1
          python tools/tune-p4-density-7.py >> artifacts/p4-apply.log 2>&1
          python tools/tune-p4-density-8.py >> artifacts/p4-apply.log 2>&1
          python tools/tune-p4-density-9.py >> artifacts/p4-apply.log 2>&1
          python tools/tune-p4-density-10.py >> artifacts/p4-apply.log 2>&1
          python tools/tune-p4-density-11.py >> artifacts/p4-apply.log 2>&1
          python tools/tune-p4-density-12.py >> artifacts/p4-apply.log 2>&1
          python tools/tune-p4-diagnostics.py >> artifacts/p4-apply.log 2>&1

      - name: Upload apply diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: p4-apply-diagnostics
          path: artifacts/p4-apply.log
          if-no-files-found: error

      - name: Enforce P4 apply
        if: steps.apply.outcome != 'success'
        run: |
          cat artifacts/p4-apply.log
          exit 1

      - name: Progressive autoplay
        run: node tests/progressive-autoplay.js

      - name: Endurance 150km
        run: node tests/endurance-150km.js

      - name: Release comprehensive
        run: node tests/release-comprehensive.js

      - name: P1 effective presentation
        run: node tests/effective-presentation-metrics.js

      - name: P2 density gate
        run: node tests/p2-density-regression.js

      - name: P3 pattern gate
        run: node tests/p3-pattern-regression.js

      - name: P4 air obstacle gate
        run: node tests/p4-air-obstacle-regression.js

      - name: Upload patched artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: p4-patched-diagnostics
          path: |
            artifacts/p1-effective-presentation-metrics.json
            artifacts/p2-density-regression.json
            artifacts/p2-effective-presentation-30-seeds.json
            artifacts/p3-pattern-regression.json
            artifacts/p4-air-obstacle-regression.json
            artifacts/progressive-autoplay-report.json
            artifacts/progressive-autoplay-summary.txt
            artifacts/release-test-report.json
            artifacts/release-test-summary.txt
            artifacts/endurance-150km-result.json
          if-no-files-found: warn

      - name: Commit verified P4 implementation
        id: finalize
        continue-on-error: true
        run: |
          {
            set -euxo pipefail
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git rm -f --ignore-unmatch .github/workflows/_apply-p4-air-obstacle-pr.yml \
              tools/apply-p4-air-obstacle.py \
              tools/fix-p4-apply.py \
              tools/tune-p4-metrics.py \
              tools/tune-p4-density.py \
              tools/tune-p4-density-2.py \
              tools/tune-p4-density-3.py \
              tools/tune-p4-density-4.py \
              tools/tune-p4-density-5.py \
              tools/tune-p4-density-6.py \
              tools/tune-p4-density-7.py \
              tools/tune-p4-density-8.py \
              tools/tune-p4-density-9.py \
              tools/tune-p4-density-10.py \
              tools/tune-p4-density-11.py \
              tools/tune-p4-density-12.py \
              tools/tune-p4-diagnostics.py
            git add -u
            test -f artifacts/p4-air-obstacle-regression.json
            git add artifacts/p4-air-obstacle-regression.json
            git status --short
            git diff --cached --check
            git commit -m "feat: add first airborne obstacle for P4"
            git push origin HEAD:${{ github.head_ref }}
          } > artifacts/p4-finalize.log 2>&1

      - name: Upload finalize diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: p4-finalize-diagnostics
          path: artifacts/p4-finalize.log
          if-no-files-found: error

      - name: Enforce P4 finalize
        if: steps.finalize.outcome != 'success'
        run: |
          cat artifacts/p4-finalize.log
          exit 1

name: Finalize P3 test gates on PR

on:
  pull_request:
    branches:
      - main
    paths:
      - ".github/workflows/_finalize-p3-tests-pr.yml"
      - "tools/finalize-p3-tests.py"
      - ".github/workflows/p2-density-regression.yml"
      - ".github/workflows/p3-pattern-regression.yml"

permissions:
  contents: write

jobs:
  finalize-and-verify:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Checkout head branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Finalize P3 test expectations
        run: python tools/finalize-p3-tests.py

      - name: Progressive autoplay
        run: node tests/progressive-autoplay.js

      - name: Endurance 150km
        run: node tests/endurance-150km.js

      - name: Release comprehensive
        run: node tests/release-comprehensive.js

      - name: P1 effective presentation
        run: node tests/effective-presentation-metrics.js

      - name: P2 density gate
        run: node tests/p2-density-regression.js

      - name: P3 pattern gate
        run: node tests/p3-pattern-regression.js

      - name: Upload final artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: p3-finalized-gates
          path: |
            artifacts/p1-effective-presentation-metrics.json
            artifacts/p2-density-regression.json
            artifacts/p2-effective-presentation-30-seeds.json
            artifacts/p3-pattern-regression.json
            artifacts/progressive-autoplay-report.json
            artifacts/progressive-autoplay-summary.txt
            artifacts/release-test-report.json
            artifacts/release-test-summary.txt
            artifacts/endurance-150km-result.json
          if-no-files-found: warn

      - name: Commit finalized test gates
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git rm .github/workflows/_finalize-p3-tests-pr.yml tools/finalize-p3-tests.py
          git add P3_DECISION_PATTERN_CONTRACT.md TEST_REPORT.md \
            tests/release-comprehensive.js \
            artifacts/p1-effective-presentation-metrics.json \
            artifacts/p2-density-regression.json \
            artifacts/p2-effective-presentation-30-seeds.json \
            artifacts/p3-pattern-regression.json \
            artifacts/progressive-autoplay-report.json \
            artifacts/progressive-autoplay-summary.txt \
            artifacts/release-test-report.json \
            artifacts/release-test-summary.txt \
            artifacts/endurance-150km-result.json
          git commit -m "test: finalize P3 release and endurance gates"
          git push origin HEAD:${{ github.head_ref }}
